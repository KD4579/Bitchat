file_uploads = On
post_max_size = 1024M
upload_max_filesize = 1024M
output_buffering = Off
max_execution_time = 300
max_input_vars = 3000
max_input_time = 300
memory_limit = 256M
zlib.output_compression = On
zlib.output_compression_level = 6

; Security settings
display_errors = Off
log_errors = On
expose_php = Off